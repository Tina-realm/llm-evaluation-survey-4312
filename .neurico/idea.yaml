  methodology:
    approach: 'Three-part paper combining systematic literature survey, critical gap
      analysis,

      and novel mathematical framework proposals. The survey uses a structured taxonomy

      covering 11 evaluation dimensions. Novel directions are developed at extended-abstract

      depth with formal definitions, theorems, and implementation sketches.

      '
    steps:
    - Conduct systematic literature review of LLM evaluation methods (2020-2025)
    - Develop taxonomy covering 11 evaluation dimensions with consistent structure
    - 'For each dimension: summarize methods, mathematical foundations, strengths,
      limitations'
    - Create comparison tables for each section (method, measures, math basis, limitations)
    - Identify representative papers and ensure coverage of most recent work (2023-2025)
    - Synthesize cross-cutting limitations from survey findings
    - 'Identify 6 major gaps: lack of unifying frameworks, brittleness under shift,
      etc.'
    - Connect gaps to formal mathematical concepts that could address them
    - Develop topological drift detection framework using persistent homology
    - Formalize sheaf-theoretic compositional evaluation with cohomological obstructions
    - Define information-geometric evaluation manifolds with Fisher metric
    - Apply persistent homology to failure mode landscape analysis
    - Propose spectral methods for contamination detection via random matrix theory
    - 'For each: provide motivation, formal setup, key definitions/theorems, implementation
      notes'
    - Write in formal academic style (LaTeX, single-column, 25-30 pages)
    - Create unified notation table
    - Compile 150+ references with emphasis on 2023-2025 works
    - Ensure clear demarcation between survey of existing work and novel proposals
    baselines:
    - Existing survey papers on LLM evaluation (e.g., Chang et al. 2023 survey)
    - HELM framework paper as example of comprehensive evaluation
    - TDA application papers in ML as precedent for mathematical tools
    metrics:
    - 'Coverage: number of evaluation dimensions and methods surveyed'
    - 'Currency: fraction of citations from 2023-2025'
    - 'Mathematical rigor: formal definitions, theorem statements, proof sketches'
    - 'Novelty: number of original framework proposals with formal detail'
    - 'Utility: actionable comparison tables and taxonomy'
    - 'Reference count: target 150+'
    - 'Page count: target 25-30 single-column pages'
