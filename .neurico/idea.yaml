  - type: report
    format: pdf
    description: 'Complete survey paper in LaTeX format (25-30 pages single-column):

      - Abstract, introduction, and paper overview

      - Part I: Systematic survey with 11 evaluation dimension sections

      - Part II: Critical gap analysis (6 major gaps identified)

      - Part III: 5 novel mathematically grounded evaluation frameworks

      - Conclusion and future work

      - Unified notation table

      - 150+ references

      '
  - type: code
    format: python
    description: 'Proof-of-concept implementations for Part III proposals:

      - Persistent homology computation on embedding spaces (drift detection)

      - Sheaf construction over task decomposition graphs

      - Information-geometric distance computation on behavior distributions

      - TDA analysis of failure mode clustering

      - Spectral analysis of performance matrices for contamination signals

      '
  - type: visualization
    format: png
    description: 'Figures for the paper:

      - Taxonomy diagram of evaluation dimensions

      - Comparison tables (rendered as figures where needed)

      - Persistence diagrams showing embedding drift

      - Sheaf diagram over task decomposition

      - Statistical manifold illustration

      - Spectral analysis plots (eigenvalue distributions)

      - Timeline of benchmark saturation

      '
  - type: data
    format: json
    description: 'Structured survey data:

      - Method taxonomy with metadata per entry

      - Citation database with categorization

      - Comparison table data for each survey section

      '
  evaluation_criteria:
  - Survey covers all 11 evaluation dimensions with consistent depth and structure
  - Each survey section includes a summary comparison table
  - At least 150 references cited, with >40% from 2023-2025
  - Part III proposals include formal mathematical definitions (not hand-waving)
  - 'Each novel direction has: motivation, formal setup, key theorem/definition, implementation
    notes'
  - Clear distinction between surveyed existing work and original contributions
  - Unified notation table is complete and consistent throughout
  - Paper is formatted correctly in LaTeX suitable for arXiv submission
  - Writing style is appropriate for ACM Computing Surveys / TMLR
  - Sheaf-theoretic framework correctly uses cohomological obstruction theory
  - TDA proposals connect to stability theorems (e.g., stability of persistence diagrams)
  - Information-geometric framework correctly uses Fisher information metric
  - Spectral methods connect to random matrix theory (Marchenko-Pastur, Tracy-Widom)
